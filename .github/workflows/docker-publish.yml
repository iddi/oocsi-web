name: Build and Publish Docker Images
on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # Step 1: Build builder stage and extract the zip
      - name: Build builder and extract artifact
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: builder
          platforms: linux/amd64
          outputs: type=local,dest=./build-output
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # Step 2: Save the zip as a GitHub Actions artifact
      - name: Upload artifact for production build
        uses: actions/upload-artifact@v4
        with:
          name: oocsi-build
          path: ./build-output/oocsi-*.zip
          retention-days: 1
      
      # Step 3: Extract metadata and build production image
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      
      # Step 4: Create a build context with the artifact
      - name: Prepare build context for production
        run: |
          mkdir -p ./docker-context/artifacts
          cp ./build-output/oocsi-*.zip ./docker-context/artifacts/
      
      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: ./docker-context
          file: ./Dockerfile.production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1