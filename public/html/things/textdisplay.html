<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/assets/images/OOCSI_logo_no_text.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" type="text/css" href="/assets/css/pico.indigo.min.css">
  <script type="text/javascript" src="/assets/js/p5.min.js"></script>
  <script type="text/javascript" src="/assets/js/oocsi-web.js"></script>
  <script type="text/javascript" src="/assets/js/things/oocsi-things.min.js"></script>
</head>
<body></body>
<script type="text/javascript">

  // register service worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Service Worker registered', reg))
        .catch(err => console.log('Service Worker registration failed', err));
    });
  }

  // define your teamspace
  oocsiThingsConfig = {
    // enter your team name, or leave empty for team selection dialog
    teamspace: ""
  };

  // thing variables
  let textDisplay;

  // define thing
  function thing() {

    oocsiThings.register('Text Display 💯', 'textdisplay', ['text'], [])

    textDisplay = oocsiThings.data('text')

    // connect external data
    oocsiThings.connect('sitgrid', 'situation', 'text')

    // subscribe to text changes
    textDisplay.subscribe((value) => {
      scaler = 1;
    })
  }

  let scaler = 1;

  function setup() {
    let canvas = createCanvas(windowWidth, windowHeight);
    canvas.parent('canvasContainer');
  }

  function draw() {
    background(0);

    translate(width/2, height/2)
    scaler *= 1.01;
    scale(scaler);
    fill(255, 255 - scaler * 40);
    textSize(64);
    text(textDisplay(), -textWidth(textDisplay())/2, -32 + scaler)
  }

</script>
</html>
