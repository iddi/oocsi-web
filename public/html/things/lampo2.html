<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/assets/images/OOCSI_logo_no_text.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" type="text/css" href="/assets/css/pico.indigo.min.css">
  <script type="text/javascript" src="/assets/js/p5.min.js"></script>
  <script type="text/javascript" src="/assets/js/oocsi-web.js"></script>
  <script type="text/javascript" src="/assets/js/things/oocsi-things.min.js"></script>
</head>
<body></body>
<script type="text/javascript">

  // register service worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Service Worker registered', reg))
        .catch(err => console.log('Service Worker registration failed', err));
    });
  }

  // define your teamspace
  oocsiThingsConfig = {
    // enter your team name, or leave empty for team selection dialog
    teamspace: ""
  };

  // thing variables
  let toggle, dim;

  // define thing
  function thing() {

    // register this thing with the name 'Lampo' and data path 'lampo';
    // this app uses 'toggle' and 'dim' as input, and 'toggle' as output
    oocsiThings.register('Lampo 🪔 2', 'lampo2', ['toggle', 'dim'], ['toggle'])

    // define own shared data
    toggle = oocsiThings.data('toggle')
    toggle(true)
    dim = oocsiThings.data('dim')
    dim(1.0)

    // connect to external data
    oocsiThings.connect('touchee', 'y', 'dim')
    oocsiThings.connect('k0bolt', 'toggle', 'toggle')
    oocsiThings.connect('mr-kip', 'd1', 'dim')
    oocsiThings.connect('chuck', 'd1', 'dim')
    oocsiThings.connect('coloradocam', 'brightness', 'dim')
    oocsiThings.connect('voluma', 'volume', 'dim')
    oocsiThings.connect('hando', 'dim', 'dim')
    oocsiThings.connect('hando', 'toggle', 'toggle')
    oocsiThings.connect('objecter', 'dim', 'dim')
    oocsiThings.connect('objecter', 'toggle', 'toggle')
  }

  function setup() {
    let canvas = createCanvas(windowWidth, windowHeight);
    canvas.parent('canvasContainer');
  }

  function draw() {
    background(0);
    fill(toggle() ? map(dim(), -1, 1, 0, 255) : 50);
    rect(50, 50, width-100, height-100);
  }

  // react to touch or mouse presses
  function touchEnded() {
    toggle(!toggle())
    oocsiThings.activity();
  }

</script>
</html>
