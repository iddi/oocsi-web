<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" type="text/css" href="/assets/css/pico.indigo.min.css">
  <script type="text/javascript" src="/assets/js/p5.min.js"></script>
  <script type="text/javascript" src="/assets/js/p5.sound.min.js"></script>
  <script type="text/javascript" src="/assets/js/oocsi-web.js"></script>
  <script type="text/javascript" src="/assets/js/things/oocsi-things.min.js"></script>
</head>
<body></body>
<script type="text/javascript">

  // define your teamspace
  oocsiThingsConfig = {
    // enter your team name, or leave empty for team selection dialog
    teamspace: ""
  };

  // thing variables
  let situation;

  // define thing
  function thing() {
    // register this thing with the name 'Soun 📻' and data path 'soun';
    // input is 'situation', no output
    oocsiThings.register('Soun 📻', 'soun', ['situation'], [])

    // define own shared data
    situation = oocsiThings.data('situation')

    // connect external data
    oocsiThings.connect('sitgrid', 'situation', 'situation')

    // subscribe to situation update
    situation.subscribe((value) => {
      sound[value]?.stop()
      sound[value]?.play()
    })
  }

  // define internal data
  let sound = {};
  // flag for initialization of browser sound engine
  let tappedOnce = false;

  function preload() {
    sound['play'] = loadSound('soun-play.mp3');
    sound['magic'] = loadSound('soun-magic.mp3');
    sound['appreciate'] = loadSound('soun-appreciate.mp3');
    sound['busy'] = loadSound('soun-busy.mp3');
    sound['very-busy'] = loadSound('soun-very-busy.mp3');
    sound['coffee'] = loadSound('soun-coffee.mp3');
  }

  function setup() {
    let canvas = createCanvas(windowWidth, windowHeight);
    canvas.parent('canvasContainer');
    background(0)
  }

  function draw() {
    background(0)
    if(!tappedOnce) {
      fill(255)
      text("Tap screen once to activate sound!", 50, 50)
    } else {
      translate(width/2, height/2)
      rotate(radians(frameCount*2))
      fill(map(sin(radians(frameCount*5)), -1, 1, 100, 255))
      ellipse(0, map(sin(radians(frameCount*5)), -1, 1, 50, 150), 20, 20)
    }
  }

  function touchStarted() {
    tappedOnce = true;
  }

</script>
