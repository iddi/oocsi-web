<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" type="text/css" href="/assets/css/pico.indigo.min.css">
  <script type="text/javascript" src="/assets/js/p5.min.js"></script>
  <script type="text/javascript" src="/assets/js/ml5.min.js"></script>
  <script type="text/javascript" src="/assets/js/oocsi-web.js"></script>
  <script type="text/javascript" src="/assets/js/things/oocsi-things.min.js"></script>
  <style type="text/css">
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body></body>
<script type="text/javascript">

  // define your teamspace
  oocsiThingsConfig = {
    // enter your team name, or leave empty for team selection dialog
    teamspace: ""
  };

  // thing variables
  let x, y, dim, toggle, label;
  let capture;
  let detector;
  let predictions = [];
  let modelReady = false;

  // define thing
  function thing() {
    // register this thing with the name 'Objecter 📦' and data path 'objecter';
    oocsiThings.register('Objecter 📦', 'objecter', [], ['x', 'y', 'dim', 'toggle', 'label']);

    // define own shared data
    x = oocsiThings.data('x');
    y = oocsiThings.data('y');
    dim = oocsiThings.data('dim');
    toggle = oocsiThings.data('toggle');
    label = oocsiThings.data('label');
  }

  function setup() {
    let canvas = createCanvas(windowWidth, windowHeight);
    canvas.parent('canvasContainer');
    
    // Setup camera capture
    let options = {
      audio: false,
      video: {
        facingMode: "environment"
      }
    };
    capture = createCapture(options);
    capture.size(640, 480);
    capture.hide();

    // Initialize objectDetector model
    detector = ml5.objectDetector('cocossd', capture, () => {
      console.log('Object Detector Model ready');
      modelReady = true;
      detector.detect(capture, gotResults);
    });
  }

  function gotResults(err, results) {
    if (err) {
      console.error(err);
      return;
    }
    predictions = results;
    detector.detect(capture, gotResults);
  }

  function draw() {
    background(0);
    
    // Fit 640x480 video to screen while maintaining aspect ratio
    let scaleRatio = max(width / 640, height / 480);
    let drawW = 640 * scaleRatio;
    let drawH = 480 * scaleRatio;
    let drawX = (width - drawW) / 2;
    let drawY = (height - drawH) / 2;

    // Draw un-mirrored video
    image(capture, drawX, drawY, drawW, drawH);

    if (!modelReady) {
      fill(255);
      textAlign(CENTER);
      text("Loading Object Detector model...", width/2, height/2);
      return;
    }

    if (predictions && predictions.length > 0) {
      // Sort predictions by area (width * height) descending
      predictions.sort((a, b) => (b.width * b.height) - (a.width * a.height));
      
      // Focus on the largest object
      let obj = predictions[0];
      
      // Feature Extraction
      let centerX = obj.x + (obj.width / 2);
      let centerY = obj.y + (obj.height / 2);

      // 1. Cursor (x, y) - Based on bounding box center
      let mappedX = constrain(map(centerX, 0, 640, -1, 1), -1, 1);
      let mappedY = constrain(map(centerY, 0, 480, -1, 1), -1, 1);
      
      // 2. Size (dim) - Relative area
      let areaRatio = (obj.width * obj.height) / (640 * 480);
      let mappedDim = constrain(areaRatio, 0, 1);

      // 3. Output logic
      toggle(true);
      x(mappedX);
      y(mappedY);
      dim(mappedDim);
      label(obj.label);

      // Visual Feedback
      drawObjectUI(obj, scaleRatio, drawX, drawY);
      
      oocsiThings.activity();
    } else {
      toggle(false);
      label(""); // clear label if nothing detected
    }
  }

  function drawObjectUI(obj, scaleRatio, offsetX, offsetY) {
    // Map bounding box to screen coordinates
    let sx = obj.x * scaleRatio + offsetX;
    let sy = obj.y * scaleRatio + offsetY;
    let sw = obj.width * scaleRatio;
    let sh = obj.height * scaleRatio;
    
    noFill();
    stroke(0, 255, 0);
    strokeWeight(4);
    rect(sx, sy, sw, sh);

    // Draw label
    noStroke();
    fill(0, 255, 0);
    textSize(24);
    textAlign(LEFT, BOTTOM);
    text(obj.label, sx, sy - 5);
  }

</script>
</html>
