<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" type="text/css" href="/assets/css/pico.indigo.min.css">
  <script type="text/javascript" src="/assets/js/p5.min.js"></script>
  <script type="text/javascript" src="/assets/js/oocsi-web.js"></script>
  <script type="text/javascript" src="/assets/js/things/oocsi-things.min.js"></script>
</head>
<body></body>
<script type="text/javascript">

  // define your teamspace
  oocsiThingsConfig = {
    // enter your team name, or leave empty for team selection dialog
    teamspace: ""
  };

  // thing variables
  let toggleMe;

  // define thing
  function thing() {

	// register this thing with the name 'K0bolt' and data path 'k0bolt';
	// this app uses 'toggle' as input and output
    oocsiThings.register('K0bolt 👹', 'k0bolt', ['toggle'], ['toggle'])

    // define own shared data
    toggleMe = oocsiThings.data('toggle')

    // connect to external data
    oocsiThings.connect('lampo', 'toggle', 'toggle')

    // handle changes in toggle
    toggleMe.subscribe((value) => {
      if(prefersOn && value || !prefersOn && !value) return;
      
      // create random timeout for this toggle
      let timeout = 1000 + Math.random() * 1000 * 10;
      // after timeout has passed, toggle! and reset k0bolt
      setTimeout(() => {
        toggleMe(!value);
        pv = undefined;
        oocsiThings.activity();
      }, timeout);

      // create starting point for animation with random y coordinate
      pv = createVector(0, random(100, height - 100))
      // set speed aligned with timeout
      speed = width/((timeout/1000)*30);
    });
  }

  // define internal data
  let pv, speed;
  let prefersOn = true;

  function setup() {
    let canvas = createCanvas(windowWidth, windowHeight);
    canvas.parent('canvasContainer');
    frameRate(30);
    noStroke();
  }

  function draw() {
    // set background based on mode
    background(prefersOn ? 0 : 255);
    if(pv !== undefined && pv.x < width + 50) {
      
      // move the ball
      pv.x += speed;
      pv.y += random(-2, 2);

      // determine color based on mode
      let kbColor = map(sin(frameCount/20.), -1, 1, 50, 255)
      fill(prefersOn ? kbColor : 255 - kbColor)
      ellipse(pv.x, pv.y, 50, 50);
    }
  };

  // toggle mode (= prefersOn) on touch
  function touchEnded() {
    prefersOn = !prefersOn;
  }

</script>
</html>
