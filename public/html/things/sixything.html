<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sixy Thing</title>
  <style>
    /* Style for the grid container */
    .grid-container {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr; /* 3 equal columns */
      grid-template-rows: 1fr 1fr;       /* 2 equal rows */
      gap: 10px;                         /* Space between frames */
      height: 100vh;                     /* Full viewport height */
      margin: 0;
      padding: 0;
    }

    /* Style for each iframe */
    .grid-item {
      border: 2px solid #000; /* Black border for each frame */
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none; /* Remove iframe border */
    }
  </style>
</head>
<body>
  <div class="grid-container">
    <div class="grid-item">
      <iframe src="index.html"></iframe>
    </div>
    <div class="grid-item">
      <iframe src="index.html"></iframe>
    </div>
    <div class="grid-item">
      <iframe src="index.html"></iframe>
    </div>
    <div class="grid-item">
      <iframe src="index.html"></iframe>
    </div>
    <div class="grid-item">
      <iframe src="index.html"></iframe>
    </div>
    <div class="grid-item">
      <iframe src="index.html"></iframe>
    </div>
  </div>
</body>
</html>
