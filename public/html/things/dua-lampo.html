<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/assets/images/OOCSI_logo_no_text.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" type="text/css" href="/assets/css/pico.indigo.min.css">
  <script type="text/javascript" src="/assets/js/p5.min.js"></script>
  <script type="text/javascript" src="/assets/js/oocsi-web.js"></script>
  <script type="text/javascript" src="/assets/js/things/oocsi-things.min.js"></script>
</head>
<body></body>
<script type="text/javascript">

  // register service worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Service Worker registered', reg))
        .catch(err => console.log('Service Worker registration failed', err));
    });
  }

  // define your teamspace
  oocsiThingsConfig = {
    // enter your team name, or leave empty for team selection dialog
    teamspace: ""
  };

  // thing variables
  let toggle1, toggle2, dim1, dim2;

  // define thing
  function thing() {

	// register this thing with the name 'Dua-Lampo' and data path 'dua-lampo';
	// this app uses 'toggle1', 'toggle2', 'dim1' and 'dim2' as input, and 'toggle1' and 'toggle2' as output
    oocsiThings.register('Dua-Lampo 💡💡', 'dua-lampo', ['toggle1', 'toggle2', 'dim1', 'dim2'], ['toggle1', 'toggle2'])

    // define own shared data
    toggle1 = oocsiThings.data('toggle1')
    toggle1(true)
    toggle2 = oocsiThings.data('toggle2')
    toggle2(true)

    dim1 = oocsiThings.data('dim1')
    dim1(0.5)
    dim2 = oocsiThings.data('dim2')
    dim2(0.5)

    // connect to external data
    oocsiThings.connect('touchee', 'x', 'dim1')
    oocsiThings.connect('touchee', 'y', 'dim2')
    oocsiThings.connect('mr-kip', 'd1', 'dim1')
    oocsiThings.connect('mr-kip', 'd2', 'dim2')
    oocsiThings.connect('chuck', 'd1', 'dim1')
    oocsiThings.connect('chuck', 'd2', 'dim2')
  }

  function setup() {
    let canvas = createCanvas(windowWidth, windowHeight);
    canvas.parent('canvasContainer');
  }

  function draw() {
    background(0);

    // first lampo
    fill(toggle1() ? map(dim1(), 1, -1, 0, 255) : 50);
    rect(50, 30, width-100, height/2-50);

    // second lampo
    fill(toggle2() ? map(dim2(), -1, 1, 0, 255) : 50);
    rect(50, height/2+25, width-100, height/2-50);
  }

  function touchEnded() {
    if(mouseY < height/2) {
      // toggle first lampo if click upper half
      toggle1(!toggle1())
    } else {
      // toggle first lampo if click in lower half
      toggle2(!toggle2())
    }
    
    oocsiThings.activity();
  }

</script>
</html>
