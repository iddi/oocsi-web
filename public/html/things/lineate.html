<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" type="text/css" href="/assets/css/pico.indigo.min.css">
  <script type="text/javascript" src="/assets/js/p5.min.js"></script>
  <script type="text/javascript" src="/assets/js/oocsi-web.js"></script>
  <script type="text/javascript" src="/assets/js/things/oocsi-things.min.js"></script>
</head>
<body></body>
<script type="text/javascript">

  // define your teamspace
  fantasticThingsConfig = {
    // enter your team name, or leave empty for team selection dialog
    teamspace: ""
  };

  // thing variables
  let data = {};

  // define thing
  function thing() {

    // register...
    fantasticThings.register('Lineate 🤌', 'lineate', ['x', 'y', 'dim', 'toggle', 'brightness', 'volume', 'color_r', 'color_g', 'color_b', 'situation', 'd1', 'd2', 'd3'], [])

    data['x'] = fantasticThings.data('x')
    data['y'] = fantasticThings.data('y')
    data['dim'] = fantasticThings.data('dim')    
    data['toggle'] = fantasticThings.data('toggle')
    data['toggle1'] = fantasticThings.data('toggle1')
    data['toggle2'] = fantasticThings.data('toggle2')
    data['brightness'] = fantasticThings.data('brightness')
    data['volume'] = fantasticThings.data('volume')
    data['colorR'] = fantasticThings.data('color_r')
    data['colorG'] = fantasticThings.data('color_g')
    data['colorB'] = fantasticThings.data('color_b')
    data['situation'] = fantasticThings.data('situation')
    data['d1'] = fantasticThings.data('d1')
    data['d2'] = fantasticThings.data('d2')
    data['d3'] = fantasticThings.data('d3')        

    // connect external data
    fantasticThings.connect('touchee', 'x', 'x')
    fantasticThings.connect('touchee', 'y', 'y')
    fantasticThings.connect('lampo', 'toggle', 'toggle')
    fantasticThings.connect('k0bolt', 'toggle', 'toggle')
    fantasticThings.connect('dua-lampo', 'toggle1', 'toggle1')
    fantasticThings.connect('dua-lampo', 'toggle2', 'toggle2')
    fantasticThings.connect('coloradocam', 'brightness', 'brightness')
    fantasticThings.connect('voluma', 'volume', 'volume')
    fantasticThings.connect('catscradle', 'd1', 'color_r')
    fantasticThings.connect('catscradle', 'd2', 'color_g')
    fantasticThings.connect('catscradle', 'd3', 'color_b')
    fantasticThings.connect('coloradocam', 'color_r', 'color_r')
    fantasticThings.connect('coloradocam', 'color_g', 'color_g')
    fantasticThings.connect('coloradocam', 'color_b', 'color_b')
    fantasticThings.connect('mr-kip', 'd1', 'd1')
    fantasticThings.connect('mr-kip', 'd2', 'd2')
    fantasticThings.connect('mr-kip', 'd3', 'd3')
    fantasticThings.connect('chuck', 'd1', 'd1')
    fantasticThings.connect('chuck', 'd2', 'd2')
    fantasticThings.connect('chuck', 'd3', 'd3')
    fantasticThings.connect('skidule', 'd1', 'd1')
    fantasticThings.connect('skidule', 'd2', 'd2')
  }

  function setup() {
    let canvas = createCanvas(windowWidth, windowHeight);
    canvas.parent('canvasContainer');

    background(0);
    colorMode(HSB, 360, 100, 100);
    strokeWeight(1);
  }

  function draw() {
    translate(25, 50);
    let index = 0;
    let propCount = Object.keys(data).length
    let rowHeight = (height - 100) / propCount;
    for (let key in data) {
      push();

      fill((360. / propCount) * index++, 100, 100);
      text(key, 0, 0);
      let value = data[key]();
      if(typeof value !== 'number') {
        if(value === false) {
          value = 0
        } else if(value === true) {
          value = 1
        } else if(value === undefined) {
          value = 0
        } else {
          value = 1
        }
      }
      translate(50 + (frameCount/3) % (width - 100), 0);
      fill(0, 5);
      rect(0, 0, 20, rowHeight);
      translate(0, map(value, -1, 1, rowHeight * 0.8, 0));
      stroke((360. / propCount) * index, 100, 100);
      line(-1, 0, 0, 0);
      
      pop();
      
      translate(0, rowHeight);
    }
  }

</script>
</html>
