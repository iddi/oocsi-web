<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" type="text/css" href="/assets/css/pico.indigo.min.css">
  <script type="text/javascript" src="/assets/js/p5.min.js"></script>
  <script type="text/javascript" src="/assets/js/p5.sound.min.js"></script>
  <script type="text/javascript" src="/assets/js/oocsi-web.js"></script>
  <script type="text/javascript" src="/assets/js/things/oocsi-things.min.js"></script>
</head>
<body></body>
<script type="text/javascript">

  // define your teamspace
  oocsiThingsConfig = {
    // enter your team name, or leave empty for team selection dialog
    teamspace: ""
  };

  // thing variables
  let x, colorR, colorG, colorB;

  // define thing
  function thing() {

    // register this thing with the name 'Windee' and data path 'windee';
    // input is 'x' and 'color_r', 'color_g', 'color_b', no output
    oocsiThings.register('Windee 💨', 'windee', ['x', 'color_r', 'color_g', 'color_b'], [])

    // define own shared data
    x = oocsiThings.data('x')
    x(0)
    colorR = oocsiThings.data('color_r')
    colorR(255);
    colorG = oocsiThings.data('color_g')
    colorG(255);
    colorB = oocsiThings.data('color_b')
    colorB(255);

    // connect external data
    oocsiThings.connect('touchee', 'x', 'x')
    oocsiThings.connect('catscradle', 'd1', 'color_r')
    oocsiThings.connect('catscradle', 'd2', 'color_g')
    oocsiThings.connect('catscradle', 'd3', 'color_b')
    oocsiThings.connect('coloradocam', 'color_r', 'color_r')
    oocsiThings.connect('coloradocam', 'color_g', 'color_g')
    oocsiThings.connect('coloradocam', 'color_b', 'color_b')
  }

  function setup() {
    let canvas = createCanvas(windowWidth, windowHeight);
    canvas.parent('canvasContainer');
  }

  function draw() {
    background(0);
    stroke(map(colorR(),0,1,0,255), map(colorG(),0,1,0,255), map(colorB(),0,1,0,255))
    strokeWeight(5);

    // draw curtain of different lines
    for(let i = 0; i < width / 20; i++) {
      line(20 + i*20, 0, 20 + i*20 + x()*20.0, height-50);
    }
  }

</script>
</html>
